<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Hold 2x Speed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #141414;
      --card-bg: rgba(32, 32, 32, 0.7);
      --accent-color: #e50914;
      --accent-hover: #ff1e27;
      --text-color: #ffffff;
      --text-secondary: #aaaaaa;
      --border-color: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Outfit', sans-serif;
      padding: 20px;
      overflow-hidden: true;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 14px;
    }

    .logo-container {
      background: var(--accent-color);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
    }

    .logo-icon {
      width: 18px;
      height: 18px;
      border-top: 4px solid white;
      border-right: 4px solid white;
      transform: rotate(45deg) translate(-2px, 2px);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #ffffff 40%, var(--accent-color) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    .label {
      font-size: 14px;
      font-weight: 400;
    }

    .value {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent-color);
    }

    /* Slider styling */
    .slider-wrapper {
      position: relative;
      margin-top: 8px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      margin-bottom: 6px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent-color);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
      transition: transform 0.1s, background-color 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: var(--accent-hover);
      transform: scale(1.15);
    }

    /* Toggle Selector Buttons */
    .zone-selector {
      display: flex;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
      margin-top: 6px;
    }

    .zone-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 4px;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
      text-align: center;
    }

    .zone-btn.active {
      background: var(--accent-color);
      color: var(--text-color);
      box-shadow: 0 4px 10px rgba(229, 9, 20, 0.3);
    }

    .zone-btn:hover:not(.active) {
      color: var(--text-color);
      background: rgba(255, 255, 255, 0.05);
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 14px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <div class="logo-icon"></div>
    </div>
    <span class="logo-text">Netflix Hold 2x</span>
  </div>

  <div class="section">
    <div class="section-title">Playback Speed</div>
    <div class="card">
      <div class="row">
        <span class="label">Speed multiplier</span>
        <span id="speedVal" class="value">2.0x</span>
      </div>
      <div class="slider-wrapper">
        <input type="range" id="speed" min="1.5" max="4.0" step="0.1" value="2.0">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Activation Delay</div>
    <div class="card">
      <div class="row">
        <span class="label">Hold duration</span>
        <span id="delayVal" class="value">350 ms</span>
      </div>
      <div class="slider-wrapper">
        <input type="range" id="delay" min="150" max="800" step="50" value="350">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Activation Zone</div>
    <div class="zone-selector">
      <button class="zone-btn" data-zone="anywhere">Entire Screen</button>
      <button class="zone-btn" data-zone="right">Right Half</button>
      <button class="zone-btn" data-zone="right30">Right 30%</button>
    </div>
  </div>

  <div class="footer">
    Click and hold the selected area to speed up.
  </div>

  <script src="popup.js"></script>
</body>
</html>
